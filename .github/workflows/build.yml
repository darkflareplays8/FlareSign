name: Build FlareSign IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Download ldid (iOS ARM64)
        run: |
          curl -L -o ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_iphoneos_arm64
          chmod +x ldid
          # Place in a Resources folder so Bundle.main.path(forResource:) finds it
          mkdir -p resources
          mv ldid resources/ldid

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: ${{ runner.os }}-deriveddata-

      - name: Build unsigned archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project FlareSign.xcodeproj \
            -scheme FlareSign \
            -configuration ${{ github.event.inputs.configuration || 'Release' }} \
            -destination "generic/platform=iOS" \
            -archivePath build/FlareSign.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Inject ldid into app bundle
        run: |
          APP_PATH=$(find build/FlareSign.xcarchive -name "*.app" | head -1)
          cp resources/ldid "$APP_PATH/ldid"

      - name: Package IPA
        run: |
          APP_PATH=$(find build/FlareSign.xcarchive -name "*.app" | head -1)
          echo "Found: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r FlareSign.ipa Payload/ && rm -rf Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlareSign-${{ github.run_number }}
          path: build/FlareSign.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: FlareSign v1.0.${{ github.run_number }}
          files: build/FlareSign.ipa
          body: "Build ${{ github.run_number }} — ${{ github.event.head_commit.message }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
