name: Build FlareSign IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Set version from run number
        id: version
        run: |
          # Auto version: 1.0.<run_number>  e.g. build 28 → 1.0.28
          VERSION="1.0.${{ github.run_number }}"
          BUILD="${{ github.run_number }}"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD=$BUILD" >> $GITHUB_ENV
          echo "ver=$VERSION" >> $GITHUB_OUTPUT

          # Write into Info.plist so the app itself reports the correct version
          plutil -replace CFBundleShortVersionString -string "$VERSION" Info.plist
          plutil -replace CFBundleVersion -string "$BUILD" Info.plist

          echo "Set version $VERSION (build $BUILD)"

      - name: Generate app icons from source image
        run: |
          SOURCE="Assets.xcassets/AppIcon.appiconset/icon-source.png"
          DEST="Assets.xcassets/AppIcon.appiconset"

          if [ ! -f "$SOURCE" ]; then
            echo "No icon-source.png found — generating a default orange placeholder"
            python3 - <<'PYEOF'
          import struct, zlib

          def make_png(size, top=(255,100,0), bottom=(200,0,0)):
              w, h = size, size
              raw = []
              for y in range(h):
                  t = y / (h - 1)
                  r = int(top[0] + t * (bottom[0] - top[0]))
                  g = int(top[1] + t * (bottom[1] - top[1]))
                  b = int(top[2] + t * (bottom[2] - top[2]))
                  row = b'\x00' + bytes([r, g, b] * w)
                  raw.append(row)
              raw_data = b''.join(raw)
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              idat = zlib.compress(raw_data)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')

          with open('Assets.xcassets/AppIcon.appiconset/icon-source.png', 'wb') as f:
              f.write(make_png(1024))
          PYEOF
          fi

          generate() {
            local size=$1
            local name=$2
            sips -z $size $size "$SOURCE" --out "$DEST/$name" > /dev/null
          }

          generate 40   icon-20@2x.png
          generate 60   icon-20@3x.png
          generate 58   icon-29@2x.png
          generate 87   icon-29@3x.png
          generate 80   icon-40@2x.png
          generate 120  icon-40@3x.png
          generate 120  icon-60@2x.png
          generate 180  icon-60@3x.png
          generate 76   icon-76@1x.png
          generate 152  icon-76@2x.png
          generate 167  icon-83.5@2x.png
          generate 1024 icon-1024.png

          echo "Icons generated successfully"

      - name: Download ldid (iOS ARM64)
        run: |
          curl -L -o ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_iphoneos_arm64
          chmod +x ldid
          mkdir -p resources
          mv ldid resources/ldid

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: ${{ runner.os }}-deriveddata-

      - name: Build unsigned archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project FlareSign.xcodeproj \
            -scheme FlareSign \
            -configuration ${{ github.event.inputs.configuration || 'Release' }} \
            -destination "generic/platform=iOS" \
            -archivePath build/FlareSign.xcarchive \
            MARKETING_VERSION="${{ env.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ env.BUILD }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Inject ldid into app bundle
        run: |
          APP_PATH=$(find build/FlareSign.xcarchive -name "*.app" | head -1)
          cp resources/ldid "$APP_PATH/ldid"

      - name: Package IPA
        run: |
          APP_PATH=$(find build/FlareSign.xcarchive -name "*.app" | head -1)
          echo "Found: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r FlareSign.ipa Payload/ && rm -rf Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlareSign-${{ steps.version.outputs.ver }}
          path: build/FlareSign.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: FlareSign v${{ steps.version.outputs.ver }}
          files: build/FlareSign.ipa
          body: "Build ${{ github.run_number }} — ${{ github.event.head_commit.message }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
