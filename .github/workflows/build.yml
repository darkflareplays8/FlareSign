name: Build FlareSign IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

env:
  APP_NAME: FlareSign
  BUNDLE_ID: com.flaresign.app
  SCHEME: FlareSign
  PROJECT: FlareSign.xcodeproj
  CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: ${{ runner.os }}-deriveddata-

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build unsigned IPA
        run: |
          mkdir -p build
          xcodebuild archive \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration ${{ env.CONFIGURATION }} \
            -destination "generic/platform=iOS" \
            -archivePath build/${{ env.APP_NAME }}.xcarchive \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_OBJC_BRIDGING_HEADER="FlareSign/FlareSign-Bridging-Header.h" \
            | xcpretty

      - name: Package IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/${{ env.APP_NAME }}.xcarchive/Products/Applications/${{ env.APP_NAME }}.app build/ipa/Payload/
          cd build/ipa
          zip -r ../${{ env.APP_NAME }}.ipa Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlareSign-${{ github.run_number }}
          path: build/${{ env.APP_NAME }}.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: FlareSign v1.0.${{ github.run_number }}
          files: build/${{ env.APP_NAME }}.ipa
          body: "Build ${{ github.run_number }} — ${{ github.event.head_commit.message }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}