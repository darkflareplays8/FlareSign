name: Build FlareSign IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

env:
  APP_NAME: FlareSign
  BUNDLE_ID: com.flaresign.app
  SCHEME: FlareSign
  PROJECT: FlareSign.xcodeproj
  CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: ${{ runner.os }}-deriveddata-

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Import signing certificate
        env:
          P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          echo "$P12_DATA" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN

      - name: Import provisioning profile
        env:
          PROFILE_DATA: ${{ secrets.PROVISIONING_PROFILE_DATA }}
        run: |
          echo "$PROFILE_DATA" | base64 --decode -o $RUNNER_TEMP/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Build archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration ${{ env.CONFIGURATION }} \
            -destination "generic/platform=iOS" \
            -archivePath build/${{ env.APP_NAME }}.xcarchive \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.APP_NAME }}" \
            SWIFT_OBJC_BRIDGING_HEADER="FlareSign/FlareSign-Bridging-Header.h" \
            | xcpretty

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/${{ env.APP_NAME }}.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist .github/ExportOptions.plist \
            | xcpretty

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlareSign-${{ github.run_number }}
          path: build/ipa/${{ env.APP_NAME }}.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain || true

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: FlareSign v1.0.${{ github.run_number }}
          files: build/ipa/${{ env.APP_NAME }}.ipa
          body: "Build ${{ github.run_number }} — ${{ github.event.head_commit.message }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
